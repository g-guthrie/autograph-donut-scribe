name = "olympus-phase1"
main = "src/index.ts"
compatibility_date = "2026-03-20"

[durable_objects]
bindings = [
  { name = "ROOMS", class_name = "OlympusRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["OlympusRoom"]

[assets]
binding = "ASSETS"
directory = "../client/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/health"]
